name: ghar_tak
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.4
  provider: ^6.0.5
  geolocator: ^10.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/AppIcon/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#00A651"
  adaptive_icon_foreground: assets/AppIcon/app_icon.png
  remove_alpha_ios: true